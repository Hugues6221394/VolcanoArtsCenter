<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<head>
    <title>Page Not Found</title>
</head>

<body>
<main layout:fragment="content">
    <section class="section" style="min-height: 80vh; display: flex; align-items: center;">
        <div class="container text-center">
            <div style="font-size: 6rem; margin-bottom: 1rem; opacity: 0.3;">🌋</div>
            <h1 style="font-size: var(--fs-h1);">Page Not Found</h1>
            <p style="color: var(--color-gray-400); margin-top: 1rem; max-width: 480px; margin-left: auto; margin-right: auto;">
                The page you're looking for doesn't exist or has been moved.
                Let's get you back on the right path.
            </p>
            <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
                <a th:href="@{/}" class="btn btn--primary">Go Home</a>
                <a th:href="@{/contact}" class="btn btn--outline">Contact Us</a>
            </div>
        </div>
    </section>
</main>
</body>
</html>
