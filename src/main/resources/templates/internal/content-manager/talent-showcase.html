<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/admin-base}">
<head><title>Talent Showcase</title></head>
<body>
<th:block layout:fragment="breadcrumb"><a th:href="@{/admin/dashboard}">Admin</a><span class="sep">›</span><span>Talent Showcase</span></th:block>
<main layout:fragment="content">
    <div class="admin-page-header">
        <div class="admin-page-header__info"><h1>Talent Showcase</h1><p>Manage featured artist and artisan profiles on the public site.</p></div>
        <div class="admin-page-header__actions"><button class="btn btn--primary btn--sm" onclick="document.getElementById('create-talent').style.display=document.getElementById('create-talent').style.display==='none'?'block':'none'">+ Add Profile</button></div>
    </div>
    <div class="admin-card" id="create-talent" style="display:none;margin-bottom:1.5rem;">
        <div class="admin-card__header"><h3>Create Talent Profile</h3></div>
        <div class="admin-card__body">
            <form th:action="@{/admin/content/talent-showcase}" method="post" class="modal-form">
                <div class="form-row"><div class="form-group"><label class="form-label">Display Name</label><input class="form-input" name="displayName" required /></div><div class="form-group"><label class="form-label">Category</label><select class="form-select" name="category"><option th:each="c : ${categories}" th:value="${c}" th:text="${c}">CAT</option></select></div></div>
                <div class="form-row"><div class="form-group"><label class="form-label">Headline</label><input class="form-input" name="headline" /></div><div class="form-group"><label class="form-label">Image URL</label><input class="form-input" name="primaryImageUrl" /></div></div>
                <div class="form-row--full"><div class="form-group"><label class="form-label">Story</label><textarea class="form-input" name="story" rows="3"></textarea></div></div>
                <div><label><input type="checkbox" name="published" /> Published</label></div>
                <div class="form-actions"><button type="button" class="btn btn--outline btn--sm" onclick="document.getElementById('create-talent').style.display='none'">Cancel</button><button type="submit" class="btn btn--primary btn--sm">Create</button></div>
            </form>
        </div>
    </div>
    <div class="admin-card">
        <div class="admin-card__header"><h3>All Profiles</h3><span class="chip chip--info" th:text="${#lists.size(items)} + ' profiles'">0</span></div>
        <div class="admin-card__body--flush"><div class="admin-table-wrap">
            <table class="admin-table"><thead><tr><th>Artist</th><th>Category</th><th>Headline</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
            <tr th:each="t : ${items}">
                <td class="cell-primary" th:text="${t.displayName}">Name</td>
                <td><span class="chip chip--primary" th:text="${t.category}">CAT</span></td>
                <td th:text="${t.headline ?: '-'}">-</td>
                <td><span class="chip" th:data-status="${t.published ? 'PUBLISHED' : 'DRAFT'}" th:text="${t.published ? 'Published' : 'Draft'}">Draft</span></td>
                <td><div style="display:flex;gap:.35rem;"><button class="btn btn--outline btn--xs" th:onclick="'document.getElementById(\'edit-tp-'+${t.id}+'\').style.display=document.getElementById(\'edit-tp-'+${t.id}+'\').style.display===\'none\'?\'table-row\':\'none\''">Edit</button><form th:action="@{|/admin/content/talent-showcase/${t.id}/delete|}" method="post" style="display:inline;"><button class="btn btn--ghost btn--xs" type="submit" onclick="return confirm('Delete?')">Delete</button></form></div></td>
            </tr>
            <tr th:each="t : ${items}" th:id="'edit-tp-'+${t.id}" style="display:none;background:rgba(0,162,89,.03);">
                <td colspan="5"><form th:action="@{|/admin/content/talent-showcase/${t.id}/update|}" method="post" style="display:flex;gap:.5rem;flex-wrap:wrap;align-items:flex-end;padding:.5rem 0;">
                    <div class="form-group" style="margin:0;flex:1;min-width:140px;"><label class="form-label">Name</label><input class="form-input" name="displayName" th:value="${t.displayName}" required /></div>
                    <div class="form-group" style="margin:0;min-width:110px;"><label class="form-label">Category</label><select class="form-select" name="category"><option th:each="c : ${categories}" th:value="${c}" th:text="${c}" th:selected="${c == t.category}">CAT</option></select></div>
                    <div class="form-group" style="margin:0;flex:1;min-width:140px;"><label class="form-label">Headline</label><input class="form-input" name="headline" th:value="${t.headline}" /></div>
                    <div class="form-group" style="margin:0;flex:1;min-width:160px;"><label class="form-label">Image URL</label><input class="form-input" name="primaryImageUrl" th:value="${t.primaryImageUrl}" /></div>
                    <label style="font-size:.8rem;"><input type="checkbox" name="published" th:checked="${t.published}" /> pub</label>
                    <button class="btn btn--primary btn--xs" type="submit">Save</button>
                </form></td>
            </tr>
            <tr th:if="${#lists.isEmpty(items)}"><td colspan="5" class="admin-empty"><div class="admin-empty__icon">🎭</div><div class="admin-empty__text">No talent profiles yet</div></td></tr>
            </tbody></table>
        </div></div>
    </div>
</main>
</body>
</html>
