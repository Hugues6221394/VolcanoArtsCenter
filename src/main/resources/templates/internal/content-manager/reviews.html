<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/admin-base}">
<head><title>Reviews</title></head>
<body>
<th:block layout:fragment="breadcrumb"><a th:href="@{/admin/dashboard}">Admin</a><span class="sep">›</span><span>Reviews</span></th:block>
<main layout:fragment="content">
    <div class="admin-page-header">
        <div class="admin-page-header__info"><h1>Reviews</h1><p>Moderate customer reviews — approve, feature, or remove.</p></div>
    </div>
    <div class="admin-card">
        <div class="admin-card__header"><h3>All Reviews</h3><span class="chip chip--info" th:text="${#lists.size(items)} + ' reviews'">0</span></div>
        <div class="admin-card__body--flush"><div class="admin-table-wrap">
            <table class="admin-table"><thead><tr><th>Reviewer</th><th>Product</th><th>Rating</th><th>Comment</th><th>Approved</th><th>Featured</th><th>Actions</th></tr></thead>
            <tbody>
            <tr th:each="r : ${items}">
                <td class="cell-primary" th:text="${r.reviewerName}">Name</td>
                <td th:text="${r.product != null ? r.product.name : '-'}">Product</td>
                <td><span th:text="${'★'.repeat(r.rating) + '☆'.repeat(5 - r.rating)}">★★★★☆</span></td>
                <td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" th:text="${r.comment}">Comment</td>
                <td><span class="chip" th:data-status="${r.approved ? 'APPROVED' : 'PENDING'}" th:text="${r.approved ? 'Approved' : 'Pending'}">Pending</span></td>
                <td th:text="${r.featured ? '⭐' : '-'}">-</td>
                <td>
                    <div style="display:flex;gap:.35rem;">
                        <form th:action="@{|/admin/content/reviews/${r.id}/moderate|}" method="post" style="display:flex;gap:.3rem;">
                            <input type="hidden" name="approved" value="true" /><input type="hidden" name="featured" th:value="${r.featured}" />
                            <button class="btn btn--outline btn--xs" type="submit">Approve</button>
                        </form>
                        <form th:action="@{|/admin/content/reviews/${r.id}/moderate|}" method="post" style="display:flex;gap:.3rem;">
                            <input type="hidden" name="approved" th:value="${r.approved}" /><input type="hidden" name="featured" value="true" />
                            <button class="btn btn--outline btn--xs" type="submit">Feature</button>
                        </form>
                        <form th:action="@{|/admin/content/reviews/${r.id}/delete|}" method="post" style="display:inline;">
                            <button class="btn btn--ghost btn--xs" type="submit" onclick="return confirm('Delete?')">Delete</button>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(items)}"><td colspan="7" class="admin-empty"><div class="admin-empty__icon">⭐</div><div class="admin-empty__text">No reviews to moderate</div></td></tr>
            </tbody></table>
        </div></div>
    </div>
</main>
</body>
</html>
