<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Art Store</title>
</head>
<body>
<main layout:fragment="content">
    <section class="page-header">
        <div class="page-header__decor"></div>
        <div class="container">
            <div class="breadcrumb">
                <a th:href="@{/}">Home</a><span class="breadcrumb__separator">/</span><span>Art Store</span>
            </div>
            <span class="section-label">Art & Crafts</span>
            <h1>Art Store</h1>
            <p class="section-subtitle" style="margin-top: 1rem;">Discover unique artworks, handcrafted pieces, and cultural collections.</p>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <form method="get" th:action="@{/art-store}" style="display:grid; grid-template-columns: 2fr 1fr 1fr auto; gap:.5rem; margin-bottom:1rem;">
                <input class="form-input" name="q" th:value="${q}" placeholder="Search by name, artist, or description" />
                <input class="form-input" type="number" step="0.01" min="0" name="minPrice" th:value="${minPrice}" placeholder="Min price" />
                <input class="form-input" type="number" step="0.01" min="0" name="maxPrice" th:value="${maxPrice}" placeholder="Max price" />
                <button class="btn btn--primary btn--sm" type="submit">Filter</button>
            </form>
            <div style="display:flex; gap: .75rem; flex-wrap: wrap; margin-bottom: 2rem;">
                <a class="btn btn--outline btn--sm" th:href="@{/art-store}">All</a>
                <a class="btn btn--outline btn--sm"
                   th:each="cat : ${categories}"
                   th:href="@{/art-store(category=${cat.slug},q=${q},minPrice=${minPrice},maxPrice=${maxPrice})}"
                   th:text="${cat.name}">Category</a>
            </div>

            <div class="grid grid-3">
                <article class="card" th:each="product : ${products}">
                    <div class="card__image">
                        <img th:src="${product.primaryImageUrl != null ? product.primaryImageUrl : '/images/logo.jpg'}" alt="Product image"/>
                        <span class="card__badge" th:text="${product.inventoryType}">UNIQUE</span>
                    </div>
                    <div class="card__body">
                        <span class="card__category" th:text="${product.category != null ? product.category.name : 'Collection'}">Collection</span>
                        <h3 class="card__title"><a th:href="@{|/art-store/${product.slug}|}" th:text="${product.name}">Product</a></h3>
                        <p class="card__text" th:text="${product.shortDescription}">Description</p>
                        <div class="card__meta">
                            <strong class="card__price" th:text="'$' + ${#numbers.formatDecimal(product.price,1,'COMMA',2,'POINT')}">$0.00</strong>
                            <a class="btn btn--ghost btn--sm" th:href="@{|/art-store/${product.slug}|}">View →</a>
                        </div>
                    </div>
                </article>
            </div>
        </div>
    </section>
</main>
</body>
</html>
