<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head><title>Paged Art Store</title></head>
<body>
<main layout:fragment="content">
    <section class="section">
        <div class="container">
            <h1>Paged Catalog</h1>
            <form method="get" th:action="@{/art-store/paged}" style="display:grid; grid-template-columns: 2fr 1fr 1fr auto; gap:.5rem; margin-bottom:1rem;">
                <input class="form-input" name="q" th:value="${q}" placeholder="Search catalog" />
                <input class="form-input" type="number" step="0.01" min="0" name="minPrice" th:value="${minPrice}" placeholder="Min price" />
                <input class="form-input" type="number" step="0.01" min="0" name="maxPrice" th:value="${maxPrice}" placeholder="Max price" />
                <button class="btn btn--primary btn--sm" type="submit">Filter</button>
            </form>
            <div style="display:flex; gap: .75rem; flex-wrap: wrap; margin-bottom: 1rem;">
                <a class="btn btn--outline btn--sm" th:href="@{/art-store/paged}">All</a>
                <a class="btn btn--outline btn--sm"
                   th:each="cat : ${categories}"
                   th:href="@{/art-store/paged(category=${cat.slug},q=${q},minPrice=${minPrice},maxPrice=${maxPrice})}"
                   th:text="${cat.name}">Category</a>
            </div>
            <div class="grid grid-3" style="margin-top:1rem;">
                <article class="card" th:each="p : ${productsPage.content}">
                    <div class="card__body">
                        <h3 class="card__title" th:text="${p.name}">Product</h3>
                        <p class="card__text">$<span th:text="${p.price}">0</span></p>
                    </div>
                </article>
            </div>
            <div style="display:flex; gap:.5rem; margin-top:1rem;">
                <a class="btn btn--outline btn--sm" th:if="${productsPage.hasPrevious()}" th:href="@{/art-store/paged(category=${selectedCategory},q=${q},minPrice=${minPrice},maxPrice=${maxPrice},page=${productsPage.number - 1},size=${productsPage.size})}">Prev</a>
                <a class="btn btn--outline btn--sm" th:if="${productsPage.hasNext()}" th:href="@{/art-store/paged(category=${selectedCategory},q=${q},minPrice=${minPrice},maxPrice=${maxPrice},page=${productsPage.number + 1},size=${productsPage.size})}">Next</a>
            </div>
        </div>
    </section>
</main>
</body>
</html>
