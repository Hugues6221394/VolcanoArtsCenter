# ── Volcano Arts Center Platform ──
# Application configuration with dev/prod profiles

spring:
  application:
    name: Volcano Arts Center Platform
  profiles:
    default: local

  # ── Thymeleaf ──
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8

  # ── JPA / Hibernate ──
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: false

  # ── Static resources ──
  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 0

  # ── File upload limits (for art images) ──
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# ── AWS S3 (Phase 4 Media) ──
aws:
  s3:
    region: ${AWS_REGION:us-east-1}
    bucket-name: ${AWS_S3_BUCKET:volcano-arts-media}
    access-key: ${AWS_ACCESS_KEY:mock_access_key}
    secret-key: ${AWS_SECRET_KEY:mock_secret_key}

# ── Server ──
server:
  port: 8080
  error:
    whitelabel:
      enabled: false

# ── Logging ──
logging:
  level:
    root: INFO
    com.volcanoartscenter: DEBUG
    org.springframework.security: INFO

platform:
  security:
    force-https: false
  captcha:
    enabled: false
    provider: recaptcha
    verify-url: ${CAPTCHA_VERIFY_URL:https://www.google.com/recaptcha/api/siteverify}
    secret: ${CAPTCHA_SECRET:}
  storage:
    local-upload-dir: ${LOCAL_UPLOAD_DIR:${user.home}/.volcano-platform/uploads}
    s3:
      enabled: false
      bucket: ${S3_BUCKET:}
      region: ${S3_REGION:}
      cdnBaseUrl: ${CDN_BASE_URL:}
  monitoring:
    backup:
      enabled: false
      cron: "0 0 2 * * *"
  notifications:
    email:
      enabled: ${EMAIL_NOTIFICATIONS_ENABLED:false}
      from: noreply@volcanoartscenter.rw
    whatsapp:
      enabled: false
      businessNumber: ""
  integrations:
    stripe:
      secret-key: ${STRIPE_SECRET_KEY:}
    mtn:
      base-url: ${MTN_MOMO_BASE_URL:}
      api-key: ${MTN_MOMO_API_KEY:}
      target-environment: ${MTN_MOMO_TARGET_ENV:sandbox}
      subscription-key: ${MTN_MOMO_SUBSCRIPTION_KEY:}
    airtel:
      base-url: ${AIRTEL_MONEY_BASE_URL:}
      client-id: ${AIRTEL_MONEY_CLIENT_ID:}
      client-secret: ${AIRTEL_MONEY_CLIENT_SECRET:}
    fedex:
      base-url: ${FEDEX_BASE_URL:}
      api-key: ${FEDEX_API_KEY:}
      api-secret: ${FEDEX_API_SECRET:}
      account-number: ${FEDEX_ACCOUNT_NUMBER:}
    email:
      api-url: ${EMAIL_API_URL:}
      api-key: ${EMAIL_API_KEY:}
    whatsapp:
      api-url: ${WHATSAPP_API_URL:}
      api-token: ${WHATSAPP_API_TOKEN:}

---
# ═══════════════════════════════════════
# DEV profile
# ═══════════════════════════════════════
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/volcano_platform
    username: postgres
    password: trigga
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: false

  thymeleaf:
    cache: false

logging:
  level:
    com.volcanoartscenter: DEBUG
    org.hibernate.SQL: DEBUG

---
# ═══════════════════════════════════════
# PROD profile
# ═══════════════════════════════════════
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true

  thymeleaf:
    cache: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: WARN
    com.volcanoartscenter: INFO
